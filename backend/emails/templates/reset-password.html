<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Your Password</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f4f6f8; font-family: Arial, sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding: 24px 0;">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="600"
            cellspacing="0"
            cellpadding="0"
            style="max-width: 600px; width: 100%; background: #ffffff; border-radius: 10px; overflow: hidden;"
          >
            <tr>
              <td style="background: #1f2937; color: #ffffff; padding: 18px 24px; font-size: 20px; font-weight: bold;">
                DRHub
              </td>
            </tr>
            <tr>
              <td style="padding: 24px; color: #1f2937; font-size: 15px; line-height: 1.6;">
                <h2 style="margin: 0 0 12px 0; font-size: 22px;">Password Reset Request</h2>
                <p style="margin: 0 0 12px 0;">Hi {{name}},</p>
                <p style="margin: 0 0 12px 0;">
                  We received a request to reset your DRHub password.
                </p>
                <p style="margin: 0 0 12px 0;">
                  Use this token to reset your password:
                </p>
                <p
                  style="margin: 0 0 12px 0; padding: 10px 12px; border: 1px solid #d1d5db; background: #f9fafb; border-radius: 6px; font-family: monospace;"
                >
                  {{resetToken}}
                </p>
                <p style="margin: 0 0 12px 0;">
                  This token expires in {{expiresInMinutes}} minutes.
                </p>
                <p style="margin: 20px 0 0 0;">Best regards,<br />DRHub Team</p>
              </td>
            </tr>
            <tr>
              <td style="padding: 14px 24px; background: #f9fafb; color: #6b7280; font-size: 12px;">
                If you did not request this, you can ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
