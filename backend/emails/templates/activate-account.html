<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activate Your Account</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f4f6f8; font-family: Arial, sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding: 24px 0;">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="600"
            cellspacing="0"
            cellpadding="0"
            style="max-width: 600px; width: 100%; background: #ffffff; border-radius: 10px; overflow: hidden;"
          >
            <tr>
              <td style="background: #1f2937; color: #ffffff; padding: 18px 24px; font-size: 20px; font-weight: bold;">
                DRHub
              </td>
            </tr>
            <tr>
              <td style="padding: 24px; color: #1f2937; font-size: 15px; line-height: 1.6;">
                <h2 style="margin: 0 0 12px 0; font-size: 22px;">Activate your account</h2>
                <p style="margin: 0 0 12px 0;">Hi {{name}},</p>
                <p style="margin: 0 0 12px 0;">
                  Thanks for creating your DRHub account. Click the button below to activate it.
                </p>
                <p style="margin: 18px 0;">
                  <a
                    href="{{activationUrl}}"
                    style="display: inline-block; background: #2563eb; color: #ffffff; text-decoration: none; padding: 10px 18px; border-radius: 6px; font-weight: bold;"
                  >
                    Activate Account
                  </a>
                </p>
                <p style="margin: 0 0 12px 0;">
                  If the button does not work, open this link:
                </p>
                <p style="margin: 0; word-break: break-all;">
                  <a href="{{activationUrl}}" style="color: #2563eb;">{{activationUrl}}</a>
                </p>
                <p style="margin: 20px 0 0 0;">Best regards,<br />DRHub Team</p>
              </td>
            </tr>
            <tr>
              <td style="padding: 14px 24px; background: #f9fafb; color: #6b7280; font-size: 12px;">
                If you did not create this account, you can ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
