<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to DRHub</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f4f6f8; font-family: Arial, sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding: 24px 0;">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="600"
            cellspacing="0"
            cellpadding="0"
            style="max-width: 600px; width: 100%; background: #ffffff; border-radius: 10px; overflow: hidden;"
          >
            <tr>
              <td style="background: #1f2937; color: #ffffff; padding: 18px 24px; font-size: 20px; font-weight: bold;">
                DRHub
              </td>
            </tr>
            <tr>
              <td style="padding: 24px; color: #1f2937; font-size: 15px; line-height: 1.6;">
                <h2 style="margin: 0 0 12px 0; font-size: 22px;">Welcome to DRHub</h2>
                <p style="margin: 0 0 12px 0;">Hi {{name}},</p>
                <p style="margin: 0 0 12px 0;">
                  Your account has been created successfully. We are excited to have you on DRHub.
                </p>
                <p style="margin: 0 0 12px 0;">
                  You can now sign in and start using the platform.
                </p>
                <p style="margin: 20px 0 0 0;">Best regards,<br />DRHub Team</p>
              </td>
            </tr>
            <tr>
              <td style="padding: 14px 24px; background: #f9fafb; color: #6b7280; font-size: 12px;">
                This is an automated message from DRHub.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
